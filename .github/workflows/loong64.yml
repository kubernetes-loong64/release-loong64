name: loong64
on:
  push:
    branches:
      - loong64-*
    tags:
      - release-loong64-*
  pull_request:
    branches:
      - loong64-*

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    outputs:
      DOCKER_TAG: ${{ steps.extract.outputs.DOCKER_TAG }}
      DOCKER_TAG_LATEST: ${{ steps.extract.outputs.DOCKER_TAG_LATEST }}
      IS_STABLE: ${{ steps.extract.outputs.IS_STABLE }}
    strategy:
      matrix:
        arch: [ amd64, loong64 ]
    permissions:
      contents: read
    services:
      registry:
        image: registry:3.1.1
        ports:
          - 5000:5000
    env:
      REGISTRY_NAME: ${{ github.event_name == 'pull_request' && '127.0.0.1:5000' || (vars.REGISTRY_NAME || 'kubernetesloong64') }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.base_ref }} (PR target)"
          else
            echo ${{ github.ref_name }}
          fi
      - name: Extract release branch
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          echo "REF=$REF"
          RAW_VERSION=$(echo $REF | awk -F'loong64-' '{print $2}')
          echo "RAW_VERSION=$RAW_VERSION"
          RELEASE_BRANCH=$(echo $RAW_VERSION | awk -F'+' '{print $1}')
          echo "RELEASE_BRANCH=$RELEASE_BRANCH"
          echo "RELEASE_BRANCH=$RELEASE_BRANCH" >> ${GITHUB_ENV}
          DOCKER_TAG=$(echo $RAW_VERSION | sed 's/+/-/g')
          echo "DOCKER_TAG=$DOCKER_TAG"
          echo "DOCKER_TAG=$DOCKER_TAG" >> ${GITHUB_ENV}
          echo "DOCKER_TAG=$DOCKER_TAG" >> ${GITHUB_OUTPUT}
          DOCKER_TAG_LATEST=$(echo $RAW_VERSION | awk -F'+' '{print $1}')
          echo "DOCKER_TAG_LATEST=$DOCKER_TAG_LATEST"
          echo "DOCKER_TAG_LATEST=$DOCKER_TAG_LATEST" >> ${GITHUB_ENV}
          echo "DOCKER_TAG_LATEST=$DOCKER_TAG_LATEST" >> ${GITHUB_OUTPUT}
          if echo "$RAW_VERSION" | grep -qE '[+].*(alpha|beta|rc)'; then
            IS_STABLE=false
          else
            IS_STABLE=true
          fi
          echo "IS_STABLE=$IS_STABLE"
          echo "IS_STABLE=$IS_STABLE" >> ${GITHUB_OUTPUT}
      - name: Clone release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: kubernetes/release
          ref: ${{ env.RELEASE_BRANCH }}
          path: release
      - name: ls
        run: ls -lah
      - name: Install build tools
        run: |
          apt update
          apt install -y git make
      - name: Install Docker CLI
        run: |
          apt remove $(dpkg --get-selections docker.io docker-compose docker-doc podman-docker containerd runc | cut -f1)
          apt update
          apt install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          # Add the repository to Apt sources:
          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/debian
          Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF
          apt update
          apt install -y docker-ce-cli
      - name: Verify Docker installation
        run: |
          ls -la /run/docker.sock 2>/dev/null || echo "/run/docker.sock not found"
          echo "DOCKER_HOST=$DOCKER_HOST"
          docker info
      - name: Login to Docker
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Discover registry IP
        if: github.event_name == 'pull_request'
        run: |
          echo "=== getent hosts registry ==="
          getent hosts registry || echo "getent not available"
          echo "=== nslookup registry ==="
          nslookup registry 2>/dev/null || echo "nslookup not available"
          echo "=== ping registry ==="
          ping -c 1 registry 2>/dev/null || echo "ping not available"
          echo "=== /etc/hosts ==="
          cat /etc/hosts
          REGISTRY_IP=$(getent hosts registry | awk '{print $1}')
          echo "REGISTRY_IP=$REGISTRY_IP"
          echo "REGISTRY_IP=$REGISTRY_IP" >> $GITHUB_ENV
          echo "REGISTRY_SERVICE=$REGISTRY_IP:5000" >> $GITHUB_ENV
      - name: Override REGISTRY_NAME with registry IP
        if: github.event_name == 'pull_request'
        run: echo "REGISTRY_NAME=${{ env.REGISTRY_IP }}:5000" >> $GITHUB_ENV
      - name: Allow insecure Docker registry
        if: github.event_name == 'pull_request'
        run: |
          docker info
          docker run --rm --privileged --pid=host \
            -v /etc/docker:/etc/docker \
            alpine:3.22 \
            sh -c "
              mkdir -p /etc/docker
              echo '{\"insecure-registries\":[\"${{ env.REGISTRY_IP }}:5000\"]}' > /etc/docker/daemon.json
              kill -HUP \$(pgrep dockerd) 2>/dev/null || true
            "
          docker info
      - name: Apply patches
        working-directory: release
        run: git apply ../*.patch
      - name: Build release debian-base
        working-directory: release
        run: |
          docker images
          echo "===== Starting make push ====="
          make push \
            ARCH=${{ matrix.arch }} QEMUIMAGE=xfan1024/qemu-user-static QEMUVERSION=latest QEMUFLAGS= \
            REGISTRY=${{ env.REGISTRY_NAME }} \
            IMAGE_VERSION=${{ env.DOCKER_TAG }} \
            -C images/build/debian-base
          echo "===== make push completed ====="
          docker images
      - name: Build release setcap
        working-directory: release
        run: |
          docker images
          echo "===== Starting make push ====="
          make push \
            ARCH=${{ matrix.arch }} QEMUIMAGE=xfan1024/qemu-user-static QEMUVERSION=latest QEMUFLAGS= \
            DEBIAN_BASE_VERSION=${{ env.DOCKER_TAG }} \
            REGISTRY=${{ env.REGISTRY_NAME }} \
            BASE_REGISTRY=${{ env.REGISTRY_NAME }} \
            IMAGE_VERSION=${{ env.DOCKER_TAG }} \
            -C images/build/setcap
          echo "===== make push completed ====="
          docker images
      - name: Build release go-runner
        working-directory: release
        run: |
          if [ "${{ matrix.arch }}" = "loong64" ]; then
            export DISTROLESS_REGISTRY=ghcr.io/loong64
            export DISTROLESS_IMAGE=debian:trixie-slim
          fi
          docker images
          echo "===== Starting make push ====="
          make push \
            PLATFORMS=linux/${{ matrix.arch }} \
            REGISTRY=${{ env.REGISTRY_NAME }} \
            IMAGE_VERSION=${{ env.DOCKER_TAG }} \
            -C images/build/go-runner
          echo "===== make push completed ====="
          docker images
      - name: Build release distroless-iptables
        working-directory: release
        run: |
          docker images
          echo "===== Starting make push ====="
          if [ "${{ matrix.arch }}" = "loong64" ]; then
            export BASEIMAGE=ghcr.io/loong64/debian:trixie-slim
          fi
          make push \
            ARCH=${{ matrix.arch }} QEMUIMAGE=xfan1024/qemu-user-static QEMUVERSION=latest QEMUFLAGS= \
            REGISTRY=${{ env.REGISTRY_NAME }} \
            GORUNNERIMAGE=${{ env.REGISTRY_NAME }}/go-runner-${{ matrix.arch }}:${{ env.DOCKER_TAG }} \
            IMAGE_VERSION=${{ env.DOCKER_TAG }} \
            -C images/build/distroless-iptables
          echo "===== make push completed ====="
          docker images

  manifest:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    env:
      REGISTRY_NAME: ${{ vars.REGISTRY_NAME || 'kubernetesloong64' }}
      DOCKER_TAG: ${{ needs.build.outputs.DOCKER_TAG }}
      DOCKER_TAG_LATEST: ${{ needs.build.outputs.DOCKER_TAG_LATEST }}
      IS_STABLE: ${{ needs.build.outputs.IS_STABLE }}
    steps:
      - name: Login to Docker
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Create and push multi-arch manifests
        run: |
          for IMAGE in debian-base setcap go-runner distroless-iptables; do
            echo "===== Creating manifest for ${IMAGE}:${{ env.DOCKER_TAG }} ====="
            docker manifest create ${{ env.REGISTRY_NAME }}/${IMAGE}:${{ env.DOCKER_TAG }} \
              ${{ env.REGISTRY_NAME }}/${IMAGE}-amd64:${{ env.DOCKER_TAG }} \
              ${{ env.REGISTRY_NAME }}/${IMAGE}-loong64:${{ env.DOCKER_TAG }}
            docker manifest push ${{ env.REGISTRY_NAME }}/${IMAGE}:${{ env.DOCKER_TAG }}
            
            echo "===== Creating manifest for ${IMAGE}:${{ env.DOCKER_TAG_LATEST }} ====="
            if [ "${{ env.IS_STABLE }}" = "true" ]; then
              docker manifest create ${{ env.REGISTRY_NAME }}/${IMAGE}:${{ env.DOCKER_TAG_LATEST }} \
              ${{ env.REGISTRY_NAME }}/${IMAGE}-amd64:${{ env.DOCKER_TAG_LATEST }} \
              ${{ env.REGISTRY_NAME }}/${IMAGE}-loong64:${{ env.DOCKER_TAG_LATEST }}
              docker manifest push ${{ env.REGISTRY_NAME }}/${IMAGE}:${{ env.DOCKER_TAG_LATEST }}
            else
              echo "=== Skipping tag (pre-release) ==="
            fi
          done
