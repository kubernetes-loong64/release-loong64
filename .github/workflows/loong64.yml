name: loong64
on:
  push:
    branches:
      - loong64-*
    tags:
      - release-loong64-*
  pull_request:
    branches:
      - loong64-*

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    outputs:
      DOCKER_TAG: ${{ steps.extract.outputs.DOCKER_TAG }}
      DOCKER_TAG_LATEST: ${{ steps.extract.outputs.DOCKER_TAG_LATEST }}
      IS_STABLE: ${{ steps.extract.outputs.IS_STABLE }}
    strategy:
      matrix:
        arch: [ amd64, loong64 ]
    permissions:
      contents: read
    services:
      registry:
        image: registry:3.1.1
        ports:
          - 5000:5000
    env:
      REGISTRY_NAME: ${{ startsWith(github.ref, 'refs/tags/') && (vars.REGISTRY_NAME || 'kubernetesloong64') || '127.0.0.1:5000' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.base_ref }} (PR target)"
          else
            echo ${{ github.ref_name }}
          fi
      - name: Extract release branch
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          echo "REF=$REF"
          RAW_VERSION=$(echo $REF | awk -F'loong64-' '{print $2}')
          echo "RAW_VERSION=$RAW_VERSION"
          RELEASE_BRANCH=$(echo $RAW_VERSION | awk -F'+' '{print $1}')
          echo "RELEASE_BRANCH=$RELEASE_BRANCH"
          echo "RELEASE_BRANCH=$RELEASE_BRANCH" >> ${GITHUB_ENV}
          DOCKER_TAG=$(echo $RAW_VERSION | sed 's/+/-/g')
          echo "DOCKER_TAG=$DOCKER_TAG"
          echo "DOCKER_TAG=$DOCKER_TAG" >> ${GITHUB_ENV}
          echo "DOCKER_TAG=$DOCKER_TAG" >> ${GITHUB_OUTPUT}
          DOCKER_TAG_LATEST=$(echo $RAW_VERSION | awk -F'+' '{print $1}')
          echo "DOCKER_TAG_LATEST=$DOCKER_TAG_LATEST"
          echo "DOCKER_TAG_LATEST=$DOCKER_TAG_LATEST" >> ${GITHUB_ENV}
          echo "DOCKER_TAG_LATEST=$DOCKER_TAG_LATEST" >> ${GITHUB_OUTPUT}
          if echo "$RAW_VERSION" | grep -qE '[+].*(alpha|beta|rc)'; then
            IS_STABLE=false
          else
            IS_STABLE=true
          fi
          echo "IS_STABLE=$IS_STABLE"
          echo "IS_STABLE=$IS_STABLE" >> ${GITHUB_OUTPUT}
      - name: Clone release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: kubernetes/release
          ref: ${{ env.RELEASE_BRANCH }}
          path: release
      - name: ls
        run: ls -lah
      - name: Install build tools
        run: |
          apt update
          apt install -y git make jq
      - name: Install Docker CLI
        run: |
          apt remove $(dpkg --get-selections docker.io docker-compose docker-doc podman-docker containerd runc | cut -f1)
          apt update
          apt install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          # Add the repository to Apt sources:
          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/debian
          Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF
          apt update
          apt install -y docker-ce-cli
      - name: Verify Docker installation
        run: |
          ls -la /run/docker.sock 2>/dev/null || echo "/run/docker.sock not found"
          echo "DOCKER_HOST=$DOCKER_HOST"
          docker info
      - name: Login to Docker
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Discover registry IP
        if: github.event_name == 'pull_request'
        run: |
          echo "=== getent hosts registry ==="
          getent hosts registry || echo "getent not available"
          echo "=== nslookup registry ==="
          nslookup registry 2>/dev/null || echo "nslookup not available"
          echo "=== ping registry ==="
          ping -c 1 registry 2>/dev/null || echo "ping not available"
          echo "=== /etc/hosts ==="
          cat /etc/hosts
          REGISTRY_IP=$(getent hosts registry | awk '{print $1}')
          echo "REGISTRY_IP=$REGISTRY_IP"
          echo "REGISTRY_IP=$REGISTRY_IP" >> $GITHUB_ENV
          echo "REGISTRY_SERVICE=$REGISTRY_IP:5000" >> $GITHUB_ENV
      - name: Override REGISTRY_NAME with registry IP
        if: github.event_name == 'pull_request'
        run: echo "REGISTRY_NAME=${{ env.REGISTRY_IP }}:5000" >> $GITHUB_ENV
      - name: Allow insecure Docker registry
        if: github.event_name == 'pull_request'
        run: |
          docker info
          docker run --rm --privileged --pid=host \
            -v /etc/docker:/etc/docker \
            alpine:3.22 \
            sh -c "
              mkdir -p /etc/docker
              echo '{\"insecure-registries\":[\"${{ env.REGISTRY_IP }}:5000\"]}' > /etc/docker/daemon.json
              kill -HUP \$(pgrep dockerd) 2>/dev/null || true
            "
          docker info
      - name: Apply patches
        working-directory: release
        run: git apply ../*.patch
      - name: Write image inspect script
        run: |
          cat <<'SCRIPT' > /usr/local/bin/inspect-image
          #!/bin/bash
          set -euo pipefail
          IMAGE_NAME=$1
          ARCH=$2
          TAR_FILE="${IMAGE_NAME}-${ARCH}.tar"
          IMAGE_REF="${REGISTRY_NAME}/${IMAGE_NAME}-${ARCH}:${DOCKER_TAG}"
          IMAGE_REF_LATEST="${REGISTRY_NAME}/${IMAGE_NAME}-${ARCH}:${{ env.DOCKER_TAG_LATEST }}"
          echo "=== Saving $IMAGE_REF ==="
          docker save -o "$TAR_FILE" "$IMAGE_REF"
          echo "=== Image tarball ==="
          ls -lha "$TAR_FILE"
          echo "=== Manifest ==="
          echo "--- repositories ---"
          tar -xOf "$TAR_FILE" repositories
          echo "--- manifest.json ---"
          tar -xOf "$TAR_FILE" manifest.json | jq
          echo "--- config ---"
          CONFIG_FILE=$(tar -xOf "$TAR_FILE" manifest.json | jq -r '.[0].Config')
          tar -xOf "$TAR_FILE" "$CONFIG_FILE" | jq
          echo "--- os, architecture ---"
          tar -xOf "$TAR_FILE" "$CONFIG_FILE" | jq '{os, architecture}'
          if [ "${{ env.IS_STABLE }}" = "true" ]; then
            docker tag $IMAGE_REF $IMAGE_REF_LATEST
            docker push $IMAGE_REF_LATEST
          else
            echo "=== Skipping latest push (pre-release) ==="
          fi
          SCRIPT
          chmod +x /usr/local/bin/inspect-image
      - name: Build release debian-base
        working-directory: release
        run: |
          docker images
          echo "===== Starting make push ====="
          make push \
            ARCH=${{ matrix.arch }} QEMUIMAGE=xfan1024/qemu-user-static QEMUVERSION=latest QEMUFLAGS= \
            REGISTRY=${{ env.REGISTRY_NAME }} \
            IMAGE_VERSION=${{ env.DOCKER_TAG }} \
            -C images/build/debian-base
          echo "===== make push completed ====="
          docker images
          inspect-image debian-base ${{ matrix.arch }}
      - name: Upload debian-base
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debian-base-${{ matrix.arch }}
          path: release/debian-base-${{ matrix.arch }}.tar
      - name: Build release setcap
        working-directory: release
        run: |
          docker images
          echo "===== Starting make push ====="
          make push \
            ARCH=${{ matrix.arch }} QEMUIMAGE=xfan1024/qemu-user-static QEMUVERSION=latest QEMUFLAGS= \
            DEBIAN_BASE_VERSION=${{ env.DOCKER_TAG }} \
            REGISTRY=${{ env.REGISTRY_NAME }} \
            BASE_REGISTRY=${{ env.REGISTRY_NAME }} \
            IMAGE_VERSION=${{ env.DOCKER_TAG }} \
            -C images/build/setcap
          echo "===== make push completed ====="
          docker images
          inspect-image setcap ${{ matrix.arch }}
      - name: Upload setcap
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: setcap-${{ matrix.arch }}
          path: release/setcap-${{ matrix.arch }}.tar
      - name: Build release go-runner
        working-directory: release
        run: |
          if [ "${{ matrix.arch }}" = "loong64" ]; then
            export DISTROLESS_REGISTRY=ghcr.io/loong64
            export DISTROLESS_IMAGE=debian:trixie-slim
          fi
          docker images
          echo "===== Starting make push ====="
          make push \
            PLATFORMS=linux/${{ matrix.arch }} \
            REGISTRY=${{ env.REGISTRY_NAME }} \
            IMAGE_VERSION=${{ env.DOCKER_TAG }} \
            -C images/build/go-runner
          echo "===== make push completed ====="
          docker images
          inspect-image go-runner ${{ matrix.arch }}
      - name: Upload go-runner
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-runner-${{ matrix.arch }}
          path: release/go-runner-${{ matrix.arch }}.tar
      - name: Build release distroless-iptables
        working-directory: release
        run: |
          docker images
          echo "===== Starting make push ====="
          if [ "${{ matrix.arch }}" = "loong64" ]; then
            export BASEIMAGE=ghcr.io/loong64/debian:trixie-slim
          fi
          make push \
            ARCH=${{ matrix.arch }} QEMUIMAGE=xfan1024/qemu-user-static QEMUVERSION=latest QEMUFLAGS= \
            REGISTRY=${{ env.REGISTRY_NAME }} \
            GORUNNERIMAGE=${{ env.REGISTRY_NAME }}/go-runner-${{ matrix.arch }}:${{ env.DOCKER_TAG }} \
            IMAGE_VERSION=${{ env.DOCKER_TAG }} \
            -C images/build/distroless-iptables
          echo "===== make push completed ====="
          docker images
          inspect-image distroless-iptables ${{ matrix.arch }}
      - name: Upload distroless-iptables
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distroless-iptables-${{ matrix.arch }}
          path: release/distroless-iptables-${{ matrix.arch }}.tar

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
      REGISTRY_NAME: ${{ vars.REGISTRY_NAME || 'kubernetesloong64' }}
      DOCKER_TAG: ${{ needs.build.outputs.DOCKER_TAG }}
      DOCKER_TAG_LATEST: ${{ needs.build.outputs.DOCKER_TAG_LATEST }}
      IS_STABLE: ${{ needs.build.outputs.IS_STABLE }}
    steps:
      - name: Login to Docker
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Create and push multi-arch manifests
        run: |
          for IMAGE in debian-base setcap go-runner distroless-iptables; do
            echo "===== Creating manifest for ${IMAGE}:${{ env.DOCKER_TAG }} ====="
            docker manifest create ${{ env.REGISTRY_NAME }}/${IMAGE}:${{ env.DOCKER_TAG }} \
              ${{ env.REGISTRY_NAME }}/${IMAGE}-amd64:${{ env.DOCKER_TAG }} \
              ${{ env.REGISTRY_NAME }}/${IMAGE}-loong64:${{ env.DOCKER_TAG }}
            docker manifest push ${{ env.REGISTRY_NAME }}/${IMAGE}:${{ env.DOCKER_TAG }}

            echo "===== Creating manifest for ${IMAGE}:${{ env.DOCKER_TAG_LATEST }} ====="
            if [ "${{ env.IS_STABLE }}" = "true" ]; then
              docker manifest create ${{ env.REGISTRY_NAME }}/${IMAGE}:${{ env.DOCKER_TAG_LATEST }} \
              ${{ env.REGISTRY_NAME }}/${IMAGE}-amd64:${{ env.DOCKER_TAG_LATEST }} \
              ${{ env.REGISTRY_NAME }}/${IMAGE}-loong64:${{ env.DOCKER_TAG_LATEST }}
              docker manifest push ${{ env.REGISTRY_NAME }}/${IMAGE}:${{ env.DOCKER_TAG_LATEST }}
            else
              echo "=== Skipping tag (pre-release) ==="
            fi
          done
      - name: Download debian-base amd64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: debian-base-amd64
          path: artifacts
      - name: Download debian-base loong64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: debian-base-loong64
          path: artifacts
      - name: Download setcap amd64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: setcap-amd64
          path: artifacts
      - name: Download setcap loong64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: setcap-loong64
          path: artifacts
      - name: Download go-runner amd64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: go-runner-amd64
          path: artifacts
      - name: Download go-runner loong64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: go-runner-loong64
          path: artifacts
      - name: Download distroless-iptables amd64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distroless-iptables-amd64
          path: artifacts
      - name: Download distroless-iptables loong64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distroless-iptables-loong64
          path: artifacts
      - name: List downloaded files
        run: find artifacts -type f
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY_BASE64 }}" | base64 -d | gpg --batch --import > /dev/null
          echo "$(gpg --list-secret-keys --keyid-format LONG | grep -Eo '[A-F0-9]{40}' | head -1):6:" | gpg --import-ownertrust
      - name: Sign artifacts
        run: |
          find artifacts -type f | while read -r file; do
            gpg --detach-sign --armor "$file"
            echo "Signed: $file"
            gpg --verify "$file".asc "$file"
          done
      - name: Generate release body
        run: |
          cat > release-body.md <<'BODYEOF'
          ## Artifacts
          
          | File                            | Download                                                                               |
          |---------------------------------|----------------------------------------------------------------------------------------|
          | debian-base-amd64.tar           | [debian-base-amd64.tar](${{ env.BASE_URL }}/debian-base-amd64.tar)                     |
          | debian-base-loong64.tar         | [debian-base-loong64.tar](${{ env.BASE_URL }}/debian-base-loong64.tar)                 |
          | setcap-amd64.tar                | [setcap-amd64.tar](${{ env.BASE_URL }}/setcap-amd64.tar)                               |
          | setcap-loong64.tar              | [setcap-loong64.tar](${{ env.BASE_URL }}/setcap-loong64.tar)                           |
          | go-runner-amd64.tar             | [go-runner-amd64.tar](${{ env.BASE_URL }}/go-runner-amd64.tar)                         |
          | go-runner-loong64.tar           | [go-runner-loong64.tar](${{ env.BASE_URL }}/go-runner-loong64.tar)                     |
          | distroless-iptables-amd64.tar   | [distroless-iptables-amd64.tar](${{ env.BASE_URL }}/distroless-iptables-amd64.tar)     |
          | distroless-iptables-loong64.tar | [distroless-iptables-loong64.tar](${{ env.BASE_URL }}/distroless-iptables-loong64.tar) |
          
          Each file has a corresponding `.asc` detached GPG signature.
          
          ## Docker images
          
          ```
          ${{ env.REGISTRY_NAME }}/debian-base:${{ env.DOCKER_TAG }}
          ${{ env.REGISTRY_NAME }}/setcap:${{ env.DOCKER_TAG }}
          ${{ env.REGISTRY_NAME }}/go-runner:${{ env.DOCKER_TAG }}
          ${{ env.REGISTRY_NAME }}/distroless-iptables:${{ env.DOCKER_TAG }}
          ${{ env.IS_STABLE == 'true' && format('{0}/debian-base:{1}', env.REGISTRY_NAME, env.DOCKER_TAG_LATEST) || '# Pre-release: skip stable version tag' }}
          ${{ env.IS_STABLE == 'true' && format('{0}/setcap:{1}', env.REGISTRY_NAME, env.DOCKER_TAG_LATEST) || '' }}
          ${{ env.IS_STABLE == 'true' && format('{0}/go-runner:{1}', env.REGISTRY_NAME, env.DOCKER_TAG_LATEST) || '' }}
          ${{ env.IS_STABLE == 'true' && format('{0}/distroless-iptables:{1}', env.REGISTRY_NAME, env.DOCKER_TAG_LATEST) || '' }}
          ```
          
          ## Verify signatures
          
          ```shell
          gpg --keyserver keys.openpgp.org --recv-keys FCF8724722CCBF9F51B1FBE376532BE7E3013105
          echo "FCF8724722CCBF9F51B1FBE376532BE7E3013105:6:" | gpg --import-ownertrust
          gpg --verify <file>.asc <file>
          ```
          BODYEOF
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body_path: release-body.md
          prerelease: ${{ env.IS_STABLE == 'false' }}
          make_latest: ${{ env.IS_STABLE == 'true' && 'legacy' || 'false' }}
          files: |
            artifacts/**
