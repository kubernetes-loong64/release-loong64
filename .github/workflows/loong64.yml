name: loong64
on:
  push:
    branches:
      - loong64/*
    tags:
      - release-loong64/*/*
  pull_request:
    branches:
      - loong64/*

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    permissions:
      contents: read
    env:
      REGISTRY_NAME: ${{ vars.REGISTRY_NAME || 'kubernetesloong64' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.base_ref }} (PR target)"
          else
            echo ${{ github.ref_name }}
          fi
      - name: Extract release branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          RELEASE_BRANCH=$(echo $REF | awk -F'/' '{print $2}')
          echo "RELEASE_BRANCH=$RELEASE_BRANCH"
          echo "RELEASE_BRANCH=$RELEASE_BRANCH" >> ${GITHUB_ENV}
      - name: Clone release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: kubernetes/release
          ref: ${{ env.RELEASE_BRANCH }}
          path: release
      - name: ls
        run: ls -lah
      - name: Install build tools
        run: |
          apt update
          apt install -y git make
      - name: Install Docker CLI
        run: |
          apt remove $(dpkg --get-selections docker.io docker-compose docker-doc podman-docker containerd runc | cut -f1)
          apt update
          apt install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          # Add the repository to Apt sources:
          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/debian
          Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF
          apt update
          apt install -y docker-ce-cli
      - name: Verify Docker installation
        run: |
          ls -la /run/docker.sock 2>/dev/null || echo "/run/docker.sock not found"
          echo "DOCKER_HOST=$DOCKER_HOST"
          docker info
      #- name: Login to Docker
      #  uses: docker/login-action@v4
      #  with:
      #    username: ${{ vars.DOCKER_USERNAME }}
      #    password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Apply patches
        working-directory: release
        run: git apply ../*.patch
      #- name: Build release debian-base
      #  working-directory: release
      #  run: |
      #    docker images
      #    echo "===== Starting make push ====="
      #    make push \
      #      ARCH=loong64 QEMUIMAGE=xfan1024/qemu-user-static QEMUVERSION=latest QEMUFLAGS= \
      #      BASEIMAGE=ghcr.io/loong64/debian:trixie-slim \
      #      REGISTRY=${{ env.REGISTRY_NAME }} \
      #      IMAGE_VERSION=${{ env.RELEASE_BRANCH }} \
      #      SERIAL=${{ github.run_number }} \
      #      -C images/build/debian-base
      #    echo "===== make push completed ====="
      #    docker images
      - name: Build release setcap
        working-directory: release
        run: |
          docker images
          echo "===== Starting make push ====="
          make push \
            -C images/build/setcap
          echo "===== make push completed ====="
          docker images
